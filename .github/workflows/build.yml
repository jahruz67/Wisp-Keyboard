name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components & NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "ndk;28.2.13676358" \
            2>&1 | tail -5

      - name: Set up signing keys (for release builds)
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          CRASHREPORTING_FILE: ${{ secrets.CRASHREPORTING_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            ./setUpPropertiesCI.sh
            echo "keystore.properties created successfully"
          else
            echo "No KEYSTORE_FILE secret set – release builds will be unsigned"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleUnstableDebug --no-daemon

      - name: Build Release APK
        run: |
          if [ -f keystore.properties ]; then
            ./gradlew assembleUnstableRelease --no-daemon
          else
            echo "keystore.properties not found – release build skipped"
            echo "Set KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_PASSWORD, KEYSTORE_ALIAS, and CRASHREPORTING_FILE secrets to enable release builds"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/outputs/apk/unstable/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/outputs/apk/unstable/release/*.apk
          if-no-files-found: ignore