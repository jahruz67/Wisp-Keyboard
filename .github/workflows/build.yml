name: Build APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          submodules: recursive
          # The build derives its version code and name from Git history and tags.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 ndk;28.2.13676358"

      - name: Set up signing keys
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          CRASHREPORTING_FILE: ${{ secrets.CRASHREPORTING_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            ./setUpPropertiesCI.sh
          else
            echo "No release keystore configured; using the debug signing key"
          fi

      - name: Build release APK
        run: ./gradlew assembleStableRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          path: build/outputs/apk/stable/release/*.apk
          if-no-files-found: error
          archive: false
